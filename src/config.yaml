site:
  name: Aithergy
  site: 'https://aithergy.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Aithergy — Strategic Intelligence
    template: '%s — Aithergy'
  description: "AI strategy, systems thinking and energy optimisation for founders and innovators."
  robots:
    index: true
    follow: true

  openGraph:
    site_name: Aithergy
    type: website
    image: '/src/assets/og-aithergy.png'
    image_width: 1200
    image_height: 628

  twitter:
    site: '@aithergy'
    card: summary_large_image
    image: '/src/assets/og-aithergy.png'


i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
